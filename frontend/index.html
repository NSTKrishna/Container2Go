<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MiniDocker — Browser-based container platform login">
    <title>MiniDocker — Login</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <span class="icon">🐳</span>
                <h1>MiniDocker</h1>
                <p>Browser-based container platform</p>
            </div>

            <div id="error-msg" class="error-msg"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username"
                           placeholder="alice" autocomplete="username" autofocus required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password"
                           placeholder="password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary" id="login-btn">
                    Launch Terminal
                </button>
            </form>

            <div class="demo-hint">
                Demo: alice/password · bob/password · admin/admin
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');
        const loginBtn = document.getElementById('login-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.remove('visible');
            loginBtn.textContent = 'Connecting...';
            loginBtn.disabled = true;

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });

                const data = await res.json();

                if (res.ok) {
                    window.location.href = '/terminal';
                } else {
                    showError(data.error || 'Login failed');
                }
            } catch (err) {
                showError('Connection failed. Is the server running?');
            }

            loginBtn.textContent = 'Launch Terminal';
            loginBtn.disabled = false;
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('visible');
        }
    </script>
</body>
</html>
